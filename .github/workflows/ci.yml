name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    name: engine (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  backtest:
    name: backtest (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backtest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest

  dashboard:
    name: dashboard (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  integration:
    name: integration (pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # End-to-end smoke test of the cross-language pipeline (tape -> Rust engine
      # -> metrics DB -> journal seed -> regime join). No Anthropic key needed;
      # guards the `make demo`/`make verify` path that the per-stack jobs miss.
      - run: bash scripts/verify_pipeline.sh
